name: Build and Release .NET Collector

on:
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collector-dotnet-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore ./IgniumLiveCollector.csproj

      - name: Build
        run: dotnet build ./IgniumLiveCollector.csproj --configuration Release --no-restore

      - name: Publish standalone executable
        run: dotnet publish ./IgniumLiveCollector.csproj -c Release -o publish --self-contained -r win-x64

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: IgniumLiveCollector-${{ github.run_number }}
          path: publish/IgniumLiveCollector.exe

      - name: Create or update release with EXE
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: publish/IgniumLiveCollector.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
